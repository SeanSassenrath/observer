name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: mkdir -p test-results
      - run: npm test -- --ci --runInBand --coverage --json --outputFile=test-results/jest-results.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-artifacts
          path: |
            coverage/lcov.info
            coverage/coverage-summary.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/jest-results.json
