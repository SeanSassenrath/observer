<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shared Playlist – Unlimited Meditations</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #12141f;
      color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wrapper {
      max-width: 400px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 32px;
    }

    .app-icon {
      width: 52px;
      height: 52px;
      margin-bottom: 14px;
    }

    .app-name {
      font-size: 17px;
      font-weight: 700;
      color: #ffffff;
    }

    .playlist-card {
      width: 100%;
      border-radius: 20px;
      padding: 26px 28px 22px;
      background: linear-gradient(145deg, #E8672A, #D4A03A);
      margin-bottom: 16px;
      min-height: 196px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .shared-label {
      font-size: 11px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.75);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .playlist-name {
      font-size: 28px;
      font-weight: 800;
      color: #ffffff;
      line-height: 1.2;
      word-break: break-word;
    }

    .playlist-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 24px;
      color: rgba(255, 255, 255, 0.85);
      font-size: 14px;
      font-weight: 500;
    }

    .meta-dot {
      font-size: 18px;
      line-height: 1;
      color: rgba(255, 255, 255, 0.6);
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-open {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 24px;
      border-radius: 16px;
      background: #6b52d9;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      border: none;
      margin-bottom: 10px;
      transition: opacity 0.15s;
    }

    .btn-open:active { opacity: 0.8; }

    .btn-store {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px 24px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      color: #e8e8ea;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 20px;
      transition: opacity 0.15s;
    }

    .btn-store:active { opacity: 0.8; }

    .footer-text {
      font-size: 13px;
      color: #565870;
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <!-- App header -->
    <div class="app-header">
      <!-- Lotus icon -->
      <svg class="app-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M26 10 C26 10 18 16 18 24 C18 28.4 21.6 32 26 32 C30.4 32 34 28.4 34 24 C34 16 26 10 26 10Z" fill="white" opacity="0.95"/>
        <path d="M26 32 C26 32 16 26 13 19 C11 14 14 9 19 10 C22 11 24 15 26 20 C24 15 22 11 19 10 C14 9 11 14 13 19 C16 26 26 32 26 32Z" fill="white" opacity="0.7"/>
        <path d="M26 32 C26 32 36 26 39 19 C41 14 38 9 33 10 C30 11 28 15 26 20 C28 15 30 11 33 10 C38 9 41 14 39 19 C36 26 26 32 26 32Z" fill="white" opacity="0.7"/>
        <path d="M26 32 C26 32 13 30 11 23 C9 17 13 13 18 15 C21 16 23 20 26 26 C23 20 21 16 18 15 C13 13 9 17 11 23 C13 30 26 32 26 32Z" fill="white" opacity="0.45"/>
        <path d="M26 32 C26 32 39 30 41 23 C43 17 39 13 34 15 C31 16 29 20 26 26 C29 20 31 16 34 15 C39 13 43 17 41 23 C39 30 26 32 26 32Z" fill="white" opacity="0.45"/>
        <line x1="26" y1="32" x2="26" y2="43" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
      </svg>
      <span class="app-name">Unlimited Meditations</span>
    </div>

    <!-- Playlist card -->
    <div class="playlist-card" id="playlist-card">
      <div>
        <div class="shared-label" id="shared-label">SHARED PLAYLIST</div>
        <div class="playlist-name" id="playlist-name">Playlist</div>
      </div>
      <div class="playlist-meta" id="playlist-meta">
        <div class="meta-item" id="track-item">
          <svg width="16" height="14" viewBox="0 0 16 14" fill="none">
            <rect x="0" y="0" width="12" height="1.8" rx="0.9" fill="white"/>
            <rect x="0" y="4.1" width="9" height="1.8" rx="0.9" fill="white"/>
            <rect x="0" y="8.2" width="7" height="1.8" rx="0.9" fill="white"/>
            <path d="M14 5 L14 12 M14 12 L11.5 9.5 M14 12 L16.5 9.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span id="track-count"></span>
        </div>
      </div>
    </div>

    <!-- Open in App -->
    <a class="btn-open" id="open-btn" href="#">
      <svg width="18" height="22" viewBox="0 0 18 22" fill="none">
        <rect x="1" y="1" width="16" height="20" rx="3.5" stroke="white" stroke-width="1.6"/>
        <rect x="6" y="18.5" width="6" height="1.2" rx="0.6" fill="white"/>
        <rect x="7.5" y="8" width="3" height="1.2" rx="0.6" fill="white"/>
      </svg>
      Open in App
    </a>

    <!-- Download on the App Store -->
    <a class="btn-store" href="https://apps.apple.com/us/app/unlimited-meditation-player/id6447492524">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <path d="M10 2.5v10" stroke="#e8e8ea" stroke-width="1.6" stroke-linecap="round"/>
        <path d="M6.5 9l3.5 3.5 3.5-3.5" stroke="#e8e8ea" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 14.5v1.5a1.5 1.5 0 001.5 1.5h11A1.5 1.5 0 0017 16v-1.5" stroke="#e8e8ea" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      Download on the App Store
    </a>

    <p class="footer-text">Free download &middot; Available on iOS</p>
  </div>

  <script>
    (function () {
      var GRADIENTS = [
        ['#5D198E', '#360C66'],
        ['#007A7A', '#003D45'],
        ['#E8672A', '#D4A03A'],
        ['#891540', '#4C030E'],
        ['#2E5E3F', '#1A3A28'],
        ['#2E3A8C', '#151C52']
      ];

      var B64 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/';

      function b64Decode(str) {
        var lookup = {};
        for (var i = 0; i < B64.length; i++) lookup[B64[i]] = i;
        var bytes = [];
        for (var i = 0; i < str.length; i += 4) {
          var b0 = lookup[str[i]] || 0;
          var b1 = lookup[str[i+1]] || 0;
          var b2 = lookup[str[i+2]] || 0;
          var b3 = lookup[str[i+3]] || 0;
          bytes.push((b0 << 2) | (b1 >> 4));
          if (str[i+2] !== '=') bytes.push(((b1 & 15) << 4) | (b2 >> 2));
          if (str[i+3] !== '=') bytes.push(((b2 & 3) << 6) | b3);
        }
        var result = '';
        for (var i = 0; i < bytes.length; ) {
          var b = bytes[i];
          if (b < 0x80) { result += String.fromCharCode(b); i += 1; }
          else if ((b & 0xe0) === 0xc0) { result += String.fromCharCode(((b & 0x1f) << 6) | (bytes[i+1] & 0x3f)); i += 2; }
          else if ((b & 0xf0) === 0xe0) { result += String.fromCharCode(((b & 0x0f) << 12) | ((bytes[i+1] & 0x3f) << 6) | (bytes[i+2] & 0x3f)); i += 3; }
          else { i += 4; }
        }
        return result;
      }

      var params = new URLSearchParams(window.location.search);
      var raw = params.get('data');

      if (raw) {
        try {
          var encoded = raw.replace(/-/g, '+').replace(/_/g, '/');
          var padded = encoded + '==='.slice((encoded.length % 4) || 4);
          var json = b64Decode(padded);
          var payload = JSON.parse(json);

          if (payload && payload.name) {
            document.getElementById('playlist-name').textContent = payload.name;
            document.title = payload.name + ' – Unlimited Meditations';
          }

          if (payload && Array.isArray(payload.meditationIds)) {
            var n = payload.meditationIds.length;
            document.getElementById('track-count').textContent = n + (n === 1 ? ' track' : ' tracks');
          } else {
            document.getElementById('track-item').style.display = 'none';
          }

          // Apply gradient
          if (payload && typeof payload.gradientIndex === 'number') {
            var g = GRADIENTS[payload.gradientIndex] || GRADIENTS[2];
            document.getElementById('playlist-card').style.background =
              'linear-gradient(145deg, ' + g[0] + ', ' + g[1] + ')';
          }
        } catch (e) {
          // bad data — leave defaults
        }

        document.getElementById('open-btn').href =
          'unlimitedmeditations://import-playlist?data=' + raw;

        // Attempt deep link, fall back gracefully (button stays visible)
        window.location = 'unlimitedmeditations://import-playlist?data=' + raw;
      } else {
        // No data — hide open button, show just store link
        document.getElementById('open-btn').style.display = 'none';
        document.getElementById('shared-label').textContent = 'UNLIMITED MEDITATIONS';
        document.getElementById('playlist-name').textContent = 'Playlist shared with you';
        document.getElementById('playlist-meta').style.display = 'none';
      }
    })();
  </script>
</body>
</html>
