<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Unlimited Meditations…</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0f;
      color: #e8e8ea;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 360px;
      width: 100%;
    }

    .logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: linear-gradient(135deg, #6b4fd8, #3b82f6);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 15px;
      color: #9999aa;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .fallback {
      display: none;
    }

    .fallback.visible {
      display: block;
    }

    .opening-msg {
      font-size: 15px;
      color: #9999aa;
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .store-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 24px;
      border-radius: 50px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.15s;
    }

    .store-btn:active { opacity: 0.75; }

    .btn-appstore {
      background: #ffffff;
      color: #0d0d0f;
    }

    .btn-googleplay {
      background: #1a1a2e;
      color: #e8e8ea;
      border: 1px solid #333345;
    }

    .store-icon {
      font-size: 20px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🧘</div>
    <h1>Unlimited Meditations</h1>
    <p class="subtitle">A playlist has been shared with you.</p>

    <p class="opening-msg" id="opening-msg">Opening the app…</p>

    <div class="fallback" id="fallback">
      <p class="subtitle">Get the app to view this playlist:</p>
      <div class="store-buttons">
        <a class="store-btn btn-appstore" href="https://apps.apple.com/us/app/unlimited-meditation-player/id6447492524" id="appstore-btn">
          <span class="store-icon">🍎</span>
          Download on the App Store
        </a>
        <a class="store-btn btn-googleplay" href="#" id="googleplay-btn">
          <span class="store-icon">▶</span>
          Get it on Google Play
        </a>
      </div>
    </div>
  </div>

  <noscript>
    <style>.opening-msg { display: none; }</style>
    <p style="color:#9999aa;font-size:15px;margin-top:16px;">
      Download Unlimited Meditations on the
      <a href="https://apps.apple.com/us/app/unlimited-meditation-player/id6447492524" style="color:#6b4fd8;">App Store</a> or
      <a href="#" style="color:#6b4fd8;">Google Play</a>
      to view this playlist.
    </p>
  </noscript>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var data = params.get('data');

      if (!data) {
        // No payload — just show download prompt
        document.getElementById('opening-msg').style.display = 'none';
        document.getElementById('fallback').classList.add('visible');
        return;
      }

      // Attempt to open the app via custom scheme
      window.location = 'unlimitedmeditations://import-playlist?data=' + data;

      // After 1500ms, if still on page, show fallback store buttons
      setTimeout(function () {
        document.getElementById('opening-msg').style.display = 'none';
        document.getElementById('fallback').classList.add('visible');
      }, 1500);
    })();
  </script>
</body>
</html>
